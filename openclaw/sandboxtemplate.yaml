apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
type: Opaque
stringData:
  # 在此处填写你的 Gemini API Key
  GEMINI_API_KEY: "Your Gemini API Key"
  # 固定 Token
  OPENCLAW_GATEWAY_TOKEN: "admin-token-123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "controlUi": {
          "allowedOrigins": ["*"]
        },
        "bind": "lan",
        "trustedProxies": ["127.0.0.1"],
        "auth": {
          "mode": "token",
          "token": "admin-token-123"
        },
        "remote": {
          "url": "ws://127.0.0.1:18789",
          "token": "admin-token-123"
        }
      },
      "agents": {
        "defaults": {
          "model": "google/gemini-3-flash-preview"
        }
      }
    }
  AGENTS.md: |
    # 欢迎使用 OpenClaw
    我是运行在 GKE 上的智能助理。我已经准备好使用 Gemini-3 为你服务了。
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-pvc
spec:
  # 注意：在多节点或多副本场景下，建议使用 ReadWriteMany (如 Filestore)
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: openclaw-template-kata
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: openclaw-sandbox
        runtime: kata
    spec:
      runtimeClassName: kata-clh
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
      - name: init-config
        image: busybox:latest
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        command:
        - sh
        - -c
        - |
          if [ ! -s /data/openclaw.json ]; then
            echo "Config missing or empty. Copying from ConfigMap..."
            cp /config-source/openclaw.json /data/openclaw.json
            sync
            echo "Copy complete."
          else
            echo "Valid config already exists, skipping."
          fi
        volumeMounts:
        - name: config-source-vol
          mountPath: /config-source
        - name: storage
          mountPath: /data

      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        ports:
        - containerPort: 18789
          name: gateway
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GEMINI_API_KEY
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        - name: OPENCLAW_ALLOW_INSECURE_PRIVATE_WS
          value: "1"
        - name: OPENCLAW_COMMANDS_RESTART
          value: 'false'
        - name: OPENCLAW_NO_RESPAWN
          value: 'true'
        - name: OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS
          value: '*'
        - name: OPENCLAW_PLUGINS_ENTRIES_DEVICE_PAIR_CONFIG_AUTOAPPROVEROLE
          value: 'operator'
        volumeMounts:
        - name: storage
          mountPath: /home/node/.openclaw
        resources:
          requests:
            cpu: "1"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
      
      restartPolicy: "OnFailure"
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: openclaw-pvc
      - name: config-source-vol
        configMap:
          name: openclaw-config
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: openclaw-warmpool-kata
  namespace: default
spec:
  # 警告：由于使用了 ReadWriteOnce PVC，replicas 大于 1 可能会导致挂载冲突
  # 建议在 kata-pool 负载测试完成后切换为 Filestore (RWX)
  replicas: 1
  sandboxTemplateRef:
    name: openclaw-template-kata
