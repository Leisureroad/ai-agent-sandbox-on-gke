timeout: 3600s
options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
  substitution_option: "ALLOW_LOOSE"

steps:
  # 1. Infrastructure Provisioning via Terraform
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: 'prepare-terraform-state'
    entrypoint: "bash"
    args:
    - "-c"
    - |
      # Create GCS bucket for Terraform state if it doesn't exist
      gsutil mb -p ${PROJECT_ID} gs://${PROJECT_ID}-tfstate || true

  - name: "hashicorp/terraform"
    id: 'terraform-init'
    dir: "terraform"
    args: [
      "init",
      "-backend-config=bucket=${PROJECT_ID}-tfstate",
      "-backend-config=prefix=terraform/state"
    ]
  
  - name: "hashicorp/terraform"
    id: 'terraform-apply'
    dir: "terraform"
    args: [
      "apply",
      "-var=project_id=${PROJECT_ID}",
      "-var=region=${_REGION}",
      "-var=zone=${_ZONE}",
      "-auto-approve"
    ]

  # 2. Get GKE Credentials
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: 'get-gke-credentials'
    entrypoint: "bash"
    args:
    - "-c"
    - |
      gcloud container clusters get-credentials ai-sandbox-cluster --region ${_REGION} --project ${PROJECT_ID}

  # 3. Install Runtime Support (Kata)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: 'install-kata'
    entrypoint: "bash"
    args:
    - "-c"
    - |
      # 1. Ensure jq is installed
      command -v jq >/dev/null 2>&1 || (apt-get update && apt-get install -y jq)
      
      # 2. Ensure helm is installed
      if ! command -v helm >/dev/null 2>&1; then
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      fi

      # 3. Fetch latest version and install
      export VERSION=$(curl -sSL https://api.github.com/repos/kata-containers/kata-containers/releases/latest | jq .tag_name | tr -d '"')
      helm install kata-deploy "oci://ghcr.io/kata-containers/kata-deploy-charts/kata-deploy" --version "$$VERSION" || true

      # 4. Install sandbox controller and Crd
      kubectl apply \
        -f https://github.com/kubernetes-sigs/agent-sandbox/releases/download/v0.2.1/manifest.yaml \
        -f https://github.com/kubernetes-sigs/agent-sandbox/releases/download/v0.2.1/extensions.yaml

  # 5. Configure workload identity
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: 'configure-workload-identity'
    entrypoint: "bash"
    args:
    - "-c"
    - |
      # 1. Create the Service Account
      kubectl create serviceaccount gemini-app-sa -n default || true

      # 2. Annotate the K8s Service Account
      kubectl annotate serviceaccount gemini-app-sa \
      --namespace default \
      iam.gke.io/gcp-service-account=vertex-ai-client@${PROJECT_ID}.iam.gserviceaccount.com

  # 6. Deploy OpenClaw
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: 'deploy-openclaw'
    dir: "openclaw"
    entrypoint: "bash"
    args:
    - "-c"
    - |
      echo "🚀 Deploying OpenClaw components..."
      kubectl apply -f litellm-deployment.yaml
      sed -i "s/REGION/${_REGION}/g" openclaw-sandbox-gvisor.yaml
      sed -i "s/PROJECT_ID/${PROJECT_ID}/g" openclaw-sandbox-gvisor.yaml
      kubectl apply -f openclaw-sandbox-gvisor.yaml
      
  # 7. Configure Pod snapshot 
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: 'configure-pod-snapshot'
    entrypoint: "bash"
    args:
    - "-c"
    - |
      echo "🚀 Configuring Pod snapshot..."
      kubectl apply -f - <<EOF
      apiVersion: podsnapshot.gke.io/v1alpha1
      kind: PodSnapshotStorageConfig
      metadata:
        name: openclaw-pod-snapshot-storage-config
      spec:
        snapshotStorageConfig:
          gcs:
            bucket: "sandbox-pod-snapshot-${PROJECT_ID}"
            path: "snapshots"
      EOF
      
      kubectl apply -f - <<EOF
      apiVersion: podsnapshot.gke.io/v1alpha1
      kind: PodSnapshotPolicy
      metadata:
        name: openclaw-pod-snapshot-policy
        namespace: default
      spec:
        storageConfigName: openclaw-pod-snapshot-storage-config
        selector:
          matchLabels:
            sandbox: openclaw-sandbox-gvisor
        triggerConfig:
          type: manual
          postCheckpoint: resume
      EOF
    
# Variables are handled via --substitutions at runtime
