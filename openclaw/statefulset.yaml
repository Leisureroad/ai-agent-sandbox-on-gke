apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
type: Opaque
stringData:
  GEMINI_API_KEY: "<Your Gemini API Key>"
  OPENCLAW_GATEWAY_TOKEN: "admin-token-123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "controlUi": {
          "allowedOrigins": ["*"]
        },
        "bind": "lan",
        "trustedProxies": ["127.0.0.1"],
        "auth": {
          "mode": "token",
          "token": "admin-token-123"
        },
        "remote": {
          "url": "ws://127.0.0.1:18789",
          "token": "admin-token-123"
        }
      },
      "agents": {
        "defaults": {
          "model": "google/gemini-3-flash-preview"
        }
      }
    }
  AGENTS.md: |
    # 欢迎使用 OpenClaw
    我是运行在 GKE 上的智能助理。我已经准备好使用 Gemini-3 为你服务了。
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openclaw-sts
spec:
  serviceName: "openclaw-sts"
  replicas: 3
  selector:
    matchLabels:
      app: openclaw-sts
  template:
    metadata:
      labels:
        app: openclaw-sts
    spec:
      runtimeClassName: kata-clh
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: gateway
        image: ghcr.io/openclaw/openclaw
        ports:
        - containerPort: 18789
          name: gateway
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GEMINI_API_KEY
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        - name: OPENCLAW_ALLOW_INSECURE_PRIVATE_WS
          value: "1"
        - name: OPENCLAW_COMMANDS_RESTART
          value: 'false'
        - name: OPENCLAW_NO_RESPAWN
          value: 'true'
        - name: OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS
          value: '*'
        - name: OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS
          value: '*'
        - name: OPENCLAW_PLUGINS_ENTRIES_DEVICE_PAIR_CONFIG_AUTOAPPROVEROLE
          value: 'operator'
        volumeMounts:
        - name: storage
          mountPath: /home/node/.openclaw
        - name: config
          mountPath: /home/node/.openclaw/openclaw.json
          subPath: openclaw.json
        resources:
          requests:
            cpu: "1"
            memory: "4Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
      volumes:
      - name: config
        configMap:
          name: openclaw-config
  volumeClaimTemplates:
  - metadata:
      name: storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
